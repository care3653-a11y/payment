<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose Payment Method • St. Paul School of Nursing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50">

  <!-- Navbar -->
  <nav class="bg-white shadow border-b">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <img src="https://i.imgur.com/rdosCLS.png" alt="St. Paul School of Nursing" class="h-14">
      <a href="details.html" class="text-[#003087] hover:underline font-medium">← Back to Details</a>
    </div>
  </nav>

  <div class="max-w-2xl mx-auto px-6 py-10">
    <h1 class="text-3xl font-bold text-[#003087]">Choose Payment Method</h1>
    <p id="amountDisplay" class="text-5xl font-bold text-[#003087] mt-2"></p>

    <div class="mt-12 space-y-6" id="methodsContainer"></div>
  </div>

   <!-- Custom Chat Button (Visible & Clear) -->
  <div onclick="openTawkChat()" 
       class="fixed bottom-8 right-8 bg-[#003087] hover:bg-[#002266] text-white w-16 h-16 rounded-3xl shadow-2xl flex items-center justify-center text-4xl cursor-pointer transition z-50">
    💬
  </div>
  
  <!-- Tawk.to Live Chat (Real Admin Support) -->
  <script type="text/javascript">
    var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
    (function(){
      var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
      s1.async=true;
      s1.src='https://embed.tawk.to/6a007a53287fc11c37705202/default';
      s1.charset='UTF-8';
      s1.setAttribute('crossorigin','*');
      s0.parentNode.insertBefore(s1,s0);
    })();
  </script>

  <!-- PAYMENT PROCESSING STEP -->
  <div id="processingStep" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl p-10 max-w-lg w-full mx-4">
      <h2 id="processingTitle" class="text-3xl font-semibold text-[#013066] text-center">Payment Processing</h2>
      <p id="processingSubtitle" class="text-center text-gray-600 mt-2">We need your contact details for confirmation</p>

      <div class="mt-8">
        <label class="block text-sm font-medium text-gray-700 mb-4">Who is making this payment?</label>
        
        <div class="grid grid-cols-2 gap-4">
          <button onclick="selectPayer('parent')" id="parentBtn"
                  class="payer-option flex flex-col items-center justify-center border-2 border-transparent rounded-3xl py-6 hover:border-[#51B1F7] transition">
            <i class="fas fa-user-tie text-4xl mb-3 text-[#013066]"></i>
            <span class="font-semibold">Parent / Guardian</span>
          </button>
          <button onclick="selectPayer('student')" id="studentBtn"
                  class="payer-option flex flex-col items-center justify-center border-2 border-transparent rounded-3xl py-6 hover:border-[#51B1F7] transition">
            <i class="fas fa-graduation-cap text-4xl mb-3 text-[#013066]"></i>
            <span class="font-semibold">The Student</span>
          </button>
        </div>

        <!-- Parent Form -->
        <div id="parentForm" class="hidden mt-8">
          <label class="block text-sm font-medium text-gray-700 mb-2">Email address for updates</label>
          <input id="parentEmail" type="email" placeholder="youremail@example.com" 
                 class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-[#51B1F7]">
          <p class="text-xs text-gray-500 mt-3">• Confirmation and receipt will be sent within up to 72 hours</p>
        </div>

        <!-- Student Form -->
        <div id="studentForm" class="hidden mt-8">
          <div class="flex items-start gap-3">
            <input type="checkbox" id="studentConfirm" class="mt-1 w-5 h-5 accent-[#013066]">
            <div>
              <label for="studentConfirm" class="text-sm text-gray-700">
                Payment confirmation will be sent to the student's official Herzing email address
              </label>
            </div>
          </div>
        </div>

        <button onclick="continueToSuccess()" id="continueBtn"
                class="hidden w-full mt-10 bg-[#013066] hover:bg-[#002244] text-white font-semibold py-5 rounded-3xl text-lg transition">
          Continue
        </button>
      </div>
    </div>
  </div>

  <!-- SUCCESS MODAL -->
  <div id="successModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl p-10 max-w-md w-full mx-4 text-center">
      <div class="text-7xl mb-6">🎉</div>
      <h2 class="text-4xl font-semibold text-[#013066]">Payment Successful!</h2>
      <p id="successMessage" class="mt-4 text-gray-600"></p>

      <div class="mt-8 flex flex-col gap-4">
        <button onclick="downloadReceipt()" 
                class="flex items-center justify-center gap-3 bg-[#013066] text-white py-5 rounded-3xl font-semibold text-lg hover:bg-[#002244]">
          <i class="fas fa-file-pdf"></i>
          Download PDF Receipt
        </button>
        
        <button onclick="window.location.href='index.html'" 
                class="text-[#013066] font-medium py-4">
          ← Return to Students List
        </button>
      </div>
    </div>
  </div>

  <script>
    // Get data from sessionStorage
    const selectedStudent = JSON.parse(sessionStorage.getItem('selectedStudent') || '{}');
    let amount = parseFloat(sessionStorage.getItem('paymentAmount') || 1250);
    let currentMethod = '';

    document.getElementById('amountDisplay').innerHTML = 
      `$${amount} <span class="text-2xl font-normal text-gray-500">USD</span>`;

    // Random recipient info for ACH & Wire
    function generateRandomInfo(type) {
      const banks = ["Chase Bank", "Bank of America", "Wells Fargo", "U.S. Bank"];
      const routing = Math.floor(100000000 + Math.random() * 900000000).toString();
      const account = Math.floor(1000000000 + Math.random() * 9000000000).toString();
      return {
        bank: banks[Math.floor(Math.random() * banks.length)],
        routing: routing,
        account: account,
        swift: type === 'wire' ? 'HRZGUS33XXX' : null,
        name: "Herzing University Bursar"
      };
    }

    // Render Payment Methods
    function renderMethods() {
      const container = document.getElementById('methodsContainer');
      container.innerHTML = `
        <div onclick="showMethod(this, 'In Person')" class="method-card bg-white rounded-3xl p-8 cursor-pointer hover:shadow-xl border border-gray-200">
          <div class="flex items-center gap-4">
            <i class="fas fa-building text-4xl text-emerald-600"></i>
            <div class="flex-1">
              <p class="font-semibold text-xl">Pay In Person at Finance Department</p>
              <p class="text-gray-600">Milwaukee Campus • Building A, Room 120</p>
            </div>
          </div>
          <div class="mt-6 hidden method-content">
            <p><strong>Address:</strong> 97-77 Queens Blvd, Rego Park, NY 11374, United States</p>
            <p><strong>Hours:</strong> Monday–Friday, 8:30 AM – 4:30 PM</p>
            <button onclick="processPayment('In Person', event)" class="mt-8 w-full bg-[#013066] text-white py-5 rounded-3xl text-lg font-medium">I Have Paid In Person</button>
          </div>
        </div>

        <div onclick="showMethod(this, 'Credit Card')" class="method-card bg-white rounded-3xl p-8 cursor-pointer hover:shadow-xl border border-gray-200">
          <div class="flex items-center gap-4">
            <i class="fas fa-credit-card text-4xl text-blue-600"></i>
            <div class="flex-1">
              <p class="font-semibold text-xl">Credit / Debit Card</p>
              <p class="text-gray-600">$500 maximum per transaction</p>
            </div>
          </div>
          <div class="mt-6 hidden method-content">
            ${amount > 500 ? `<p class="text-amber-600 text-sm mb-4">⚠️ Amount exceeds $500 limit. Paying $${Math.min(500, amount)} now.</p>` : ''}
            <input type="text" value="4242 4242 4242 4242" class="w-full px-5 py-4 border rounded-2xl mb-4 text-lg">
            <div class="grid grid-cols-2 gap-4">
              <input type="text" value="12/28" class="px-5 py-4 border rounded-2xl">
              <input type="text" value="424" class="px-5 py-4 border rounded-2xl">
            </div>
            <button onclick="processPayment('Credit Card', event)" class="mt-8 w-full bg-[#013066] text-white py-5 rounded-3xl text-lg font-medium">Pay $${Math.min(500, amount)} Now</button>
          </div>
        </div>

        <div onclick="showMethod(this, 'ACH Transfer')" class="method-card bg-white rounded-3xl p-8 cursor-pointer hover:shadow-xl border border-gray-200">
          <div class="flex items-center gap-4">
            <i class="fas fa-bank text-4xl text-purple-600"></i>
            <div class="flex-1">
              <p class="font-semibold text-xl">ACH Bank Transfer</p>
              <p class="text-gray-600">No limit • 1–3 business days</p>
            </div>
          </div>
          <div class="mt-6 hidden method-content">
            ${(() => {
              const info = generateRandomInfo('ach');
              return `
                <p><strong>Pay to:</strong> ${info.name}</p>
                <p><strong>Bank:</strong> ${info.bank}</p>
                <p><strong>Routing #:</strong> ${info.routing} <span onclick="navigator.clipboard.writeText('${info.routing}');alert('Copied!')" class="cursor-pointer text-blue-600 text-xs">COPY</span></p>
                <p><strong>Account #:</strong> ${info.account} <span onclick="navigator.clipboard.writeText('${info.account}');alert('Copied!')" class="cursor-pointer text-blue-600 text-xs">COPY</span></p>
                <button onclick="processPayment('ACH Transfer', event)" class="mt-8 w-full bg-[#013066] text-white py-5 rounded-3xl text-lg font-medium">Confirm ACH Transfer of $${amount}</button>
              `;
            })()}
          </div>
        </div>

        <div onclick="showMethod(this, 'Wire Transfer')" class="method-card bg-white rounded-3xl p-8 cursor-pointer hover:shadow-xl border border-gray-200">
          <div class="flex items-center gap-4">
            <i class="fas fa-globe text-4xl text-amber-600"></i>
            <div class="flex-1">
              <p class="font-semibold text-xl">Wire Transfer</p>
              <p class="text-gray-600">No limit • Same-day possible</p>
            </div>
          </div>
          <div class="mt-6 hidden method-content">
            ${(() => {
              const info = generateRandomInfo('wire');
              return `
                <p><strong>Pay to:</strong> ${info.name}</p>
                <p><strong>Bank:</strong> ${info.bank}</p>
                <p><strong>Routing #:</strong> ${info.routing}</p>
                <p><strong>Account #:</strong> ${info.account}</p>
                <p><strong>SWIFT:</strong> ${info.swift}</p>
                <button onclick="processPayment('Wire Transfer', event)" class="mt-8 w-full bg-[#013066] text-white py-5 rounded-3xl text-lg font-medium">Confirm Wire Transfer of $${amount}</button>
              `;
            })()}
          </div>
        </div>
      `;
    }

    window.showMethod = function(el, method) {
      document.querySelectorAll('.method-content').forEach(c => c.classList.add('hidden'));
      el.querySelector('.method-content').classList.remove('hidden');
    };

    window.processPayment = function(method, e) {
      e.stopImmediatePropagation();
      currentMethod = method;
      document.getElementById('processingStep').classList.remove('hidden');
    };

    // Payer selection
    window.selectPayer = function(type) {
      document.querySelectorAll('.payer-option').forEach(b => b.classList.remove('border-[#51B1F7]', 'bg-[#013066]/5'));
      if (type === 'parent') document.getElementById('parentBtn').classList.add('border-[#51B1F7]', 'bg-[#013066]/5');
      else document.getElementById('studentBtn').classList.add('border-[#51B1F7]', 'bg-[#013066]/5');

      document.getElementById('parentForm').classList.toggle('hidden', type !== 'parent');
      document.getElementById('studentForm').classList.toggle('hidden', type !== 'student');
      document.getElementById('continueBtn').classList.remove('hidden');
    };

    window.continueToSuccess = function() {
      let payerEmail = '';
      if (document.getElementById('parentForm').classList.contains('hidden') === false) {
        payerEmail = document.getElementById('parentEmail').value.trim() || "parent.email@example.com";
      } else {
        if (!document.getElementById('studentConfirm').checked) {
          alert("Please tick the confirmation box");
          return;
        }
        payerEmail = `${selectedStudent.name ? selectedStudent.name.toLowerCase().replace(/\s+/g, '.') : 'student'}@herzing.edu`;
      }

      document.getElementById('processingStep').classList.add('hidden');
      document.getElementById('successModal').classList.remove('hidden');

      document.getElementById('successMessage').innerHTML = 
        `Confirmation and receipt will be sent to <strong>${payerEmail}</strong>`;
    };

    // Download PDF Receipt
    window.downloadReceipt = function() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      const txId = 'HU-' + Math.random().toString(36).substring(2, 10).toUpperCase();

      doc.setFillColor(1, 48, 102);
      doc.rect(0, 0, 210, 40, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(22);
      doc.text("Herzing University", 105, 18, { align: "center" });
      doc.setFontSize(12);
      doc.text("Official Receipt • HUPay", 105, 28, { align: "center" });

      doc.setTextColor(0, 0, 0);
      doc.setFontSize(14);
      doc.text(`Date: ${today}`, 20, 55);
      doc.text(`Transaction ID: ${txId}`, 20, 65);
      doc.text(`Student: ${selectedStudent.name || 'Student'}`, 20, 80);
      doc.text(`Program: ${selectedStudent.program || ''}`, 20, 88);
      doc.text(`School ID: ${selectedStudent.schoolId || ''}`, 20, 96);
      doc.setFontSize(16);
      doc.text(`Amount Paid: $${amount}`, 20, 115);
      doc.setFontSize(12);
      doc.text(`Payment Method: ${currentMethod}`, 20, 130);
      doc.text("Thank you for your payment!", 20, 150);

      doc.save(`Herzing_Receipt_${selectedStudent.schoolId || 'student'}.pdf`);
    };

    // === Open Tawk.to Chat ===
    function openTawkChat() {
      if (window.Tawk_API) {
        window.Tawk_API.showWidget();
        window.Tawk_API.maximize();
      } else {
        alert("Chat is loading... Please wait a moment and try again.");
      }
    }

    function addMessage(text, sender) {
      const container = document.getElementById('chatMessages');
      const msg = document.createElement('div');
      msg.className = sender === 'admin' ? 'flex justify-start' : 'flex justify-end';
      msg.innerHTML = `<div class="${sender === 'admin' ? 'bg-white shadow-sm' : 'bg-[#013066] text-white'} max-w-[80%] px-5 py-3 rounded-3xl">${text}</div>`;
      container.appendChild(msg);
      container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;
      addMessage(text, 'user');
      input.value = '';

      setTimeout(() => {
        const replies = [
          "Thanks for asking! Our team usually replies within 1 minute during business hours.",
          "You can pay using any of the methods shown on this page.",
          "All payments are secure and encrypted with bank-level security.",
          "Need help choosing between ACH and Wire? I can explain the difference.",
          "Your receipt will be emailed instantly after successful payment.",
          "For in-person payments, bring your School ID to the Finance Office.",
          "Would you like me to walk you through the steps?"
        ];
        const randomReply = replies[Math.floor(Math.random() * replies.length)];
        addMessage(randomReply, "admin");
      }, 1100);
    }

    // Initialize page
    renderMethods();
  </script>
</body>
</html>
