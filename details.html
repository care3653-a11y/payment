<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Details • St. Paul's School of Nursing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50">

  <nav class="bg-white shadow border-b">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <img src="https://i.imgur.com/rdosCLS.png" alt="St. Paul School of Nursing" class="h-14">
      <a href="index.html" class="text-[#003087] hover:underline font-medium">← Back to Students</a>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto px-6 py-12">
    <div id="detailsContent" class="bg-white rounded-3xl shadow-xl p-10"></div>
  </div>

  <script>
    const student = JSON.parse(sessionStorage.getItem('selectedStudent') || '{}');
    const container = document.getElementById('detailsContent');

    const feeBreakdowns = {
      1: [ { label: "Tuition Fee (Spring 2026)", amount: 950 }, { label: "Nursing Lab & Clinical Fee", amount: 150 }, { label: "Technology & Course Materials", amount: 100 }, { label: "Late Registration Fee", amount: 50 } ],
      2: [ { label: "MBA Tuition Fee (Q2)", amount: 650 }, { label: "Program Administration Fee", amount: 120 }, { label: "Online Learning Platform Fee", amount: 80 }, { label: "Student Activity Fee", amount: 40 } ],
      3: [ { label: "Tuition Fee (Spring 2026)", amount: 1100 }, { label: "IT Lab & Equipment Fee", amount: 450 }, { label: "Certification Exam Voucher", amount: 300 }, { label: "Technology Access Fee", amount: 250 } ],
      4: [ // Sherry Magics
        { label: "Spring 2026 Tuition - Nursing & Healthcare", amount: 3200 },
        { label: "Clinical Rotations & Lab Fees", amount: 800 },
        { label: "Healthcare Program Materials & Uniforms", amount: 500 },
        { label: "Simulation Center & Technology Fee", amount: 300 },
        { label: "Last Year Arrears (Fall 2025 Balance)", amount: 1890 }
      ]
    };

    if (!student.name) {
      container.innerHTML = `<p class="text-red-500 text-center py-20">No student selected. <a href="index.html" class="underline">Go back</a></p>`;
    } else {
      const breakdown = feeBreakdowns[student.id] || [];
      const totalDue = breakdown.reduce((sum, item) => sum + item.amount, 0);

      // Real Sherry Magics photo
      const photoUrl = student.id === 4 
        ? "https://i.imgur.com/rMB41L6.jpeg" 
        : "https://via.placeholder.com/600x600/013066/FFFFFF?text=" + encodeURIComponent(student.name.split(' ')[0]);

      container.innerHTML = `
        <div class="flex flex-col md:flex-row gap-10 items-start">
          
          <!-- Student Picture -->
          <div class="flex flex-col items-center md:items-start md:w-1/3">
            <div class="w-56 h-56 mx-auto md:mx-0 rounded-3xl overflow-hidden border-4 border-[#51B1F7] shadow-2xl">
              <img src="${photoUrl}" 
                   alt="${student.name}" 
                   class="w-full h-full object-cover">
            </div>
            <h1 class="text-4xl font-semibold text-[#013066] mt-6 text-center md:text-left">${student.name}</h1>
            <p class="text-[#51B1F7] text-xl mt-1">${student.program}</p>
            <p class="text-gray-500 font-mono mt-2">School ID: <span class="font-semibold">${student.schoolId}</span></p>
          </div>

          <!-- Fee Breakdown -->
          <div class="flex-1">
            <div class="flex justify-between items-baseline mb-6">
              <h2 class="text-3xl font-semibold text-gray-800">Fee Breakdown</h2>
              <div class="text-right">
                <p class="text-xs uppercase tracking-widest text-gray-500">TOTAL DUE</p>
                <p class="text-5xl font-bold text-[#013066]">$${totalDue}</p>
              </div>
            </div>

            <div class="space-y-4">
              ${breakdown.map(item => `
                <div class="flex justify-between bg-gray-50 rounded-2xl px-6 py-4">
                  <span class="text-gray-700">${item.label}</span>
                  <span class="font-semibold">$${item.amount}</span>
                </div>
              `).join('')}
            </div>

            <div class="mt-10 border-t pt-8 flex justify-between text-2xl font-medium">
              <span>Total Amount Owed</span>
              <span class="text-[#013066]">$${totalDue}</span>
            </div>

            <button onclick="goToPayment()" 
              class="mt-10 w-full bg-[#013066] hover:bg-[#002244] text-white py-6 rounded-3xl text-2xl font-semibold flex items-center justify-center gap-4">
              Pay Now <i class="fas fa-arrow-right"></i>
            </button>
          </div>
        </div>
      `;
    }

    window.goToPayment = function() {
      const totalDue = parseFloat(document.querySelector('.text-5xl.font-bold').textContent.replace('$',''));
      sessionStorage.setItem('paymentAmount', totalDue);
      window.location.href = 'payment.html';
    };
  </script>
</body>
</html>
