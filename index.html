<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Herzing University | Payment Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap'); body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gray-50">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="https://upload.wikimedia.org/wikipedia/commons/9/9d/Logo_Blue_transparent.png" alt="Herzing University" class="h-11">
      </div>
      <div class="flex items-center gap-8 text-sm font-medium text-gray-700">
        <a href="#" class="text-[#013066] font-semibold">HUPay Portal</a>
      </div>
      <div class="flex items-center gap-3">
        <span class="text-sm">Welcome, Parent/Guardian</span>
        <div class="w-9 h-9 bg-[#013066] text-white rounded-2xl flex items-center justify-center">👨‍👧</div>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-10">
    <h1 class="text-4xl font-semibold text-[#013066]">Students Owing Fees</h1>
    <p class="text-gray-600 mt-2">Select a student to make a payment</p>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-10" id="studentsList"></div>
  </div>

  <script>
    const students = [
      { id: 1, name: "Alex Rivera", program: "BSN • Nursing", schoolId: "HU-456789", due: 1250 },
      { id: 2, name: "Jordan Patel", program: "MBA • Business Administration", schoolId: "HU-112233", due: 890 },
      { id: 3, name: "Taylor Kim", program: "BS • Information Technology", schoolId: "HU-998877", due: 2100 },
      { id: 4, name: "Sherry Magics", program: "Nursing & Healthcare", schoolId: "HU-334455", due: 6690 }
    ];

    function renderStudents() {
      const container = document.getElementById("studentsList");
      container.innerHTML = students.map(student => `
        <div onclick="selectStudent(${student.id})" class="bg-white rounded-3xl shadow-md hover:shadow-xl p-8 cursor-pointer transition border border-gray-100">
          <div class="flex justify-between items-start">
            <div>
              <p class="font-semibold text-2xl">${student.name}</p>
              <p class="text-[#51B1F7]">${student.program}</p>
            </div>
            <div class="text-right">
              <p class="text-xs uppercase tracking-widest text-red-500">Due</p>
              <p class="text-4xl font-bold text-[#013066]">$${student.due}</p>
            </div>
          </div>
          <button class="mt-8 w-full bg-[#013066] text-white py-4 rounded-3xl font-medium flex items-center justify-center gap-2 hover:bg-[#002244]">
            <i class="fas fa-credit-card"></i> View & Pay Fees
          </button>
        </div>
      `).join('');
    }

    window.selectStudent = function(id) {
      const student = students.find(s => s.id === id);
      sessionStorage.setItem('selectedStudent', JSON.stringify(student));
      window.location.href = 'login.html';
    };

    renderStudents();
  </script>
</body>
</html>
