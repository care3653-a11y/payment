<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saint Paul's School of Nursing | Payment Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50">

  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="text-3xl">✚</div>
        <h1 class="text-2xl font-bold text-[#003087]">Saint Paul's School of Nursing</h1>
      </div>
      <div class="text-[#003087] font-semibold">Payment Portal</div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-12">
    <h1 class="text-4xl font-bold text-[#003087]">Students Owing Fees</h1>
    <p class="text-gray-600 mt-2">Select a student to view and pay fees</p>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-10" id="studentsList"></div>
  </div>

  <script>
    const students = [
      { id: 1, name: "Alex Rivera", program: "BSN • Nursing", schoolId: "HU-456789", due: 1250 },
      { id: 2, name: "Jordan Patel", program: "MBA • Business Administration", schoolId: "HU-112233", due: 890 },
      { id: 3, name: "Taylor Kim", program: "BS • Information Technology", schoolId: "HU-998877", due: 2100 },
      { id: 4, name: "Sherry Magics", program: "Nursing & Healthcare", schoolId: "HU-334455", due: 6690 },
      { id: 5, name: "Maria Gonzalez", program: "Medical Assisting", schoolId: "HU-556677", due: 2450 },
      { id: 6, name: "Jamal Washington", program: "Criminal Justice", schoolId: "HU-778899", due: 1340 },
      { id: 7, name: "Priya Sharma", program: "Healthcare Administration", schoolId: "HU-223344", due: 3780 },
      { id: 8, name: "Carlos Mendoza", program: "Dental Hygiene", schoolId: "HU-667788", due: 2890 },
      { id: 9, name: "Aisha Khan", program: "Radiologic Technology", schoolId: "HU-990011", due: 4120 },
      { id: 10, name: "Liam Thompson", program: "BSN • Nursing", schoolId: "HU-445566", due: 1670 },
      { id: 11, name: "Sophia Chen", program: "Graphic Design", schoolId: "HU-112244", due: 980 },
      { id: 12, name: "Ethan Morales", program: "Business Management", schoolId: "HU-778811", due: 3150 },
      { id: 13, name: "Olivia Patel", program: "Medical Billing & Coding", schoolId: "HU-334422", due: 1890 },
      { id: 14, name: "Noah Williams", program: "IT Support Specialist", schoolId: "HU-556600", due: 2740 },
      { id: 15, name: "Isabella Rodriguez", program: "Surgical Technology", schoolId: "HU-990022", due: 4520 },
      { id: 16, name: "Mason Lee", program: "Pharmacy Technician", schoolId: "HU-223377", due: 1320 },
      { id: 17, name: "Emma Davis", program: "Massage Therapy", schoolId: "HU-667799", due: 850 },
      { id: 18, name: "Lucas Brown", program: "Public Health", schoolId: "HU-112255", due: 2980 },
      { id: 19, name: "Zoe Garcia", program: "Veterinary Technology", schoolId: "HU-334488", due: 5210 }
    ];

    function renderStudents() {
      const container = document.getElementById("studentsList");
      container.innerHTML = students.map(student => `
        <div onclick="selectStudent(${student.id})" class="bg-white rounded-3xl shadow-md hover:shadow-xl p-8 cursor-pointer transition border border-gray-100">
          <div class="flex justify-between items-start">
            <div>
              <p class="font-semibold text-2xl">${student.name}</p>
              <p class="text-[#51B1F7]">${student.program}</p>
            </div>
            <div class="text-right">
              <p class="text-xs uppercase tracking-widest text-red-500">Due</p>
              <p class="text-4xl font-bold text-[#013066]">$${student.due}</p>
            </div>
          </div>
          <button class="mt-8 w-full bg-[#013066] text-white py-4 rounded-3xl font-medium flex items-center justify-center gap-2 hover:bg-[#002244]">
            <i class="fas fa-credit-card"></i> View & Pay Fees
          </button>
        </div>
      `).join('');
    }

    window.selectStudent = function(id) {
      const student = students.find(s => s.id === id);
      sessionStorage.setItem('selectedStudent', JSON.stringify(student));
      window.location.href = 'login.html';
    };

    renderStudents();
  </script>
</body>
</html>
